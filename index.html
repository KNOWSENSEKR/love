
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 마음코드 연애운 타로 v1.00</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#0f0a1e;
  --bg2:#1a0f35;
  --purple:#6c3fc5;
  --pink:#e040a0;
  --gold:#f0c060;
  --card-w:140px;
  --card-h:240px;
}
body{
  font-family:'Noto Serif KR',serif;
  background:var(--bg1);
  color:#e8d8f0;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Background ── */
.bg-gradient{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(108,63,197,.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(224,64,160,.25) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(15,10,30,1) 0%, transparent 100%),
    #0f0a1e;
  pointer-events:none;
}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
.particle{
  position:absolute;border-radius:50%;
  animation:float var(--dur,6s) ease-in-out infinite var(--delay,0s);
  opacity:.0;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ── Layout ── */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:4rem;}

/* ── Header ── */
header{
  text-align:center;padding:1.2rem 1rem 1.5rem;width:100%;
  background:linear-gradient(180deg,rgba(108,63,197,.15) 0%,transparent 100%);
  border-bottom:1px solid rgba(240,192,96,.12);
  position:relative;
}
.yt-bar{
  display:flex;align-items:center;justify-content:center;
  gap:.5rem;margin-bottom:1rem;
}
.yt-link{
  display:flex;align-items:center;gap:.45rem;
  text-decoration:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,80,80,.25);
  border-radius:99px;
  padding:.35rem .9rem .35rem .55rem;
  transition:all .3s;
}
.yt-link:hover{
  background:rgba(255,50,50,.15);
  border-color:rgba(255,80,80,.6);
  box-shadow:0 0 16px rgba(255,50,50,.25);
}
.yt-icon{
  width:26px;height:26px;flex-shrink:0;
}
.yt-name{
  font-family:'Noto Serif KR',serif;
  font-size:.88rem;font-weight:600;
  color:#ff8080;letter-spacing:.04em;
}
.yt-sub-text{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;
  color:rgba(255,120,120,.5);text-transform:uppercase;margin-left:.2rem;
}
.heart-icon{font-size:1.6rem;display:block;margin-bottom:.35rem;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.title-main{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.4rem,4vw,2.2rem);
  background:linear-gradient(135deg,#e040a0,#c084fc,#f0c060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:.06em;
  line-height:1.3;
}
.title-version{
  display:inline-block;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;
  color:rgba(192,132,252,.45);vertical-align:middle;margin-left:.4rem;
}
.title-sub{
  font-size:.8rem;color:rgba(200,170,240,.6);
  letter-spacing:.22em;margin-top:.35rem;
  font-family:'Cinzel',serif;text-transform:uppercase;
}

/* ── Screens ── */
.screen{display:none;width:100%;flex:1;flex-direction:column;align-items:center;padding:2rem 1rem;}
.screen.active{display:flex;}

/* ── Welcome ── */
#screen-welcome{gap:2rem;justify-content:center;}
.category-grid{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;max-width:600px;}
.category-btn{
  flex:1;min-width:120px;max-width:160px;
  border:1.5px solid rgba(192,132,252,.3);
  background:rgba(108,63,197,.08);
  color:#d8b4fe;padding:1rem .75rem;
  cursor:pointer;border-radius:12px;
  font-family:'Noto Serif KR',serif;font-size:.85rem;
  transition:all .3s;text-align:center;
}
.category-btn:hover,.category-btn.active{
  border-color:var(--pink);background:rgba(224,64,160,.15);
  color:#fce4ff;box-shadow:0 0 20px rgba(224,64,160,.2);
  transform:translateY(-2px);
}
.category-btn .cat-emoji{font-size:1.5rem;display:block;margin-bottom:.4rem;}
.category-btn .cat-name{font-weight:600;display:block;margin-bottom:.2rem;}
.category-btn .cat-desc{font-size:.72rem;color:rgba(200,170,240,.6);display:block;}

.spread-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;}
.spread-pill{
  border:1px solid rgba(192,132,252,.3);background:transparent;
  color:rgba(200,170,240,.7);padding:.5rem 1.2rem;border-radius:99px;
  cursor:pointer;font-family:'Noto Serif KR',serif;font-size:.82rem;
  transition:all .25s;
}
.spread-pill:hover,.spread-pill.active{
  border-color:#c084fc;background:rgba(192,132,252,.15);color:#e9d5ff;
}

.start-btn{
  background:linear-gradient(135deg,#9333ea,#ec4899,#f59e0b);
  border:none;color:#fff;
  padding:1.1rem 3.5rem;border-radius:99px;
  font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:600;
  cursor:pointer;letter-spacing:.08em;
  box-shadow:0 4px 30px rgba(147,51,234,.4);
  transition:all .3s;position:relative;overflow:hidden;
}
.start-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);transition:transform .6s;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(147,51,234,.5);}
.start-btn:hover::after{transform:translateX(100%);}

.oracle-quote{
  font-size:.9rem;font-style:italic;
  color:rgba(200,170,240,.6);text-align:center;
  max-width:380px;line-height:1.8;
  border-left:2px solid rgba(192,132,252,.3);
  padding-left:1rem;
}

/* ── Shuffle Screen ── */
#screen-shuffle{gap:2rem;justify-content:center;min-height:70vh;}
.shuffle-instruction{
  text-align:center;
  font-size:.95rem;color:rgba(200,170,240,.75);line-height:1.8;
}
.shuffle-instruction strong{color:#d8b4fe;font-weight:600;}
.deck-wrap{
  position:relative;width:var(--card-w);height:var(--card-h);
  cursor:pointer;
}
.deck-pile{
  position:absolute;inset:0;
  background:linear-gradient(145deg,#2d1b69,#4c1d95,#2d1b69);
  border:1.5px solid rgba(192,132,252,.4);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .4s ease;
}
.deck-pile::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(192,132,252,.2);border-radius:8px;
}
.deck-pile svg{width:55%;height:55%;opacity:.5;}
.deck-pile:nth-child(1){transform:rotate(-5deg) translate(-10px,4px);}
.deck-pile:nth-child(2){transform:rotate(-2.5deg) translate(-5px,2px);}
.deck-pile:nth-child(3){transform:rotate(0deg);}
.deck-pile:nth-child(4){transform:rotate(2.5deg) translate(5px,-2px);}
.deck-pile:nth-child(5){transform:rotate(5deg) translate(10px,-4px);}
.deck-wrap:hover .deck-pile:nth-child(1){transform:rotate(-10deg) translate(-20px,8px);}
.deck-wrap:hover .deck-pile:nth-child(2){transform:rotate(-5deg) translate(-10px,4px);}
.deck-wrap:hover .deck-pile:nth-child(4){transform:rotate(5deg) translate(10px,-4px);}
.deck-wrap:hover .deck-pile:nth-child(5){transform:rotate(10deg) translate(20px,-8px);}
@keyframes shake{0%,100%{transform:rotate(0) translate(0)}25%{transform:rotate(-12deg) translate(-30px,10px)}75%{transform:rotate(12deg) translate(30px,-10px)}}
.shuffling .deck-pile{animation:shake .45s ease-in-out;}
.shuffling .deck-pile:nth-child(2){animation-delay:.05s;}
.shuffling .deck-pile:nth-child(3){animation-delay:.1s;}
.shuffling .deck-pile:nth-child(4){animation-delay:.15s;}
.shuffling .deck-pile:nth-child(5){animation-delay:.2s;}

.shuffle-progress{
  display:flex;gap:.5rem;
}
.prog-dot{
  width:10px;height:10px;border-radius:50%;
  border:1.5px solid rgba(192,132,252,.4);
  transition:all .3s;
}
.prog-dot.done{background:#c084fc;border-color:#c084fc;box-shadow:0 0 8px #c084fc;}

.reveal-btn{
  background:linear-gradient(135deg,#7c3aed,#db2777);
  border:none;color:#fff;padding:.9rem 2.5rem;border-radius:99px;
  font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;
  cursor:pointer;box-shadow:0 4px 24px rgba(124,58,237,.4);
  transition:all .3s;display:none;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.reveal-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.5);}

.back-link{
  font-size:.8rem;color:rgba(200,170,240,.4);
  cursor:pointer;letter-spacing:.15em;font-family:'Cinzel',serif;text-transform:uppercase;
  transition:color .2s;border:none;background:none;
}
.back-link:hover{color:rgba(200,170,240,.8);}

/* ── Reading Screen ── */
#screen-reading{gap:1.5rem;padding-top:1.5rem;}
.reading-header{text-align:center;}
.reading-category{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.35em;
  color:rgba(192,132,252,.6);text-transform:uppercase;
}
.cards-area{
  display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;
  padding:.5rem;
}
.card-slot{display:flex;flex-direction:column;align-items:center;gap:.6rem;}
.pos-label{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.25em;
  color:rgba(192,132,252,.5);text-transform:uppercase;
}
/* Tarot Card */
.tarot-card{
  width:var(--card-w);height:var(--card-h);
  perspective:900px;cursor:pointer;
  flex-shrink:0;
}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .85s cubic-bezier(.4,0,.2,1);
}
.tarot-card.flipped .card-inner{transform:rotateY(180deg);}
.c-back,.c-front{
  position:absolute;inset:0;border-radius:12px;
  backface-visibility:hidden;overflow:hidden;
  border:1.5px solid rgba(192,132,252,.3);
}
.c-back{
  background:linear-gradient(145deg,#2d1b69,#4c1d95,#2d1b69);
  display:flex;align-items:center;justify-content:center;
}
.c-back-inner{width:80%;height:80%;border:1px solid rgba(192,132,252,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.c-front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
  background:#1a0f35;
}
.c-art{
  flex:1;position:relative;overflow:hidden;padding:0;
}
.c-plate{
  background:rgba(0,0,0,.55);padding:.4rem .5rem;text-align:center;
  border-top:1px solid rgba(192,132,252,.15);
}
.c-name{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;color:var(--gold);display:block;text-transform:uppercase;}
.c-ko{font-size:.72rem;color:rgba(200,170,240,.7);display:block;margin-top:1px;}
.c-reversed-tag{
  position:absolute;bottom:40px;right:6px;
  font-size:.48rem;letter-spacing:.08em;font-family:'Cinzel',serif;
  background:rgba(220,38,38,.6);color:#fca5a5;
  padding:2px 5px;border-radius:3px;text-transform:uppercase;display:none;
}
.card-reversed .c-reversed-tag{display:block;}
.card-reversed .c-front{transform:rotateY(180deg) rotateZ(180deg);}

/* ── Interpretation ── */
.interp-box{
  max-width:680px;width:100%;
  background:linear-gradient(145deg,rgba(45,27,105,.7),rgba(26,15,53,.8));
  border:1px solid rgba(192,132,252,.2);border-radius:16px;
  padding:1.75rem;
  opacity:0;transform:translateY(16px);transition:all .6s .2s;
}
.interp-box.show{opacity:1;transform:translateY(0);}
.interp-title{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;
  color:var(--pink);text-transform:uppercase;text-align:center;
  margin-bottom:1.2rem;padding-bottom:.8rem;
  border-bottom:1px solid rgba(192,132,252,.15);
}
.interp-card{
  margin-bottom:1rem;padding:1rem;
  background:rgba(192,132,252,.05);border-radius:10px;
  border:1px solid rgba(192,132,252,.1);
}
.interp-card-header{
  display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;
}
.interp-pos-badge{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;
  background:rgba(192,132,252,.2);color:#c084fc;
  padding:.2rem .55rem;border-radius:99px;text-transform:uppercase;flex-shrink:0;
}
.interp-card-name{font-size:.85rem;color:var(--gold);font-weight:600;}
.interp-text{font-size:.88rem;color:rgba(220,200,240,.8);line-height:1.85;font-style:italic;}
.keywords-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;}
.keyword-tag{
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;
  border:1px solid rgba(192,132,252,.25);color:rgba(192,132,252,.7);
  padding:.18rem .5rem;border-radius:4px;text-transform:uppercase;
}
.overall-msg{
  margin-top:1rem;padding:1rem;text-align:center;
  background:linear-gradient(135deg,rgba(147,51,234,.1),rgba(236,72,153,.1));
  border-radius:10px;border:1px solid rgba(236,72,153,.2);
}
.overall-msg p{font-size:.88rem;color:rgba(220,200,240,.75);line-height:1.8;}
.action-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;}
.act-btn{
  background:linear-gradient(135deg,#7c3aed,#db2777);
  border:none;color:#fff;padding:.85rem 2rem;border-radius:99px;
  font-family:'Noto Serif KR',serif;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .3s;
  box-shadow:0 4px 20px rgba(124,58,237,.3);
}
.act-btn:hover{transform:translateY(-2px);}
.act-btn-ghost{
  background:transparent;border:1px solid rgba(192,132,252,.3);
  color:rgba(192,132,252,.7);padding:.85rem 2rem;border-radius:99px;
  font-family:'Noto Serif KR',serif;font-size:.88rem;
  cursor:pointer;transition:all .3s;
}
.act-btn-ghost:hover{border-color:#c084fc;color:#c084fc;}

@media(max-width:480px){
  :root{--card-w:110px;--card-h:190px;}
  .cards-area{gap:1rem;}
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="particles" id="particles"></div>

<div id="app">
<header>
  <div class="yt-bar">
    <a class="yt-link" href="https://www.youtube.com/@mindcode_k" target="_blank" rel="noopener">
      <svg class="yt-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="5" fill="#FF0000" opacity=".9"/>
        <path d="M19.6 7.8a2 2 0 0 0-1.4-1.4C16.8 6 12 6 12 6s-4.8 0-6.2.4A2 2 0 0 0 4.4 7.8C4 9.2 4 12 4 12s0 2.8.4 4.2a2 2 0 0 0 1.4 1.4C7.2 18 12 18 12 18s4.8 0 6.2-.4a2 2 0 0 0 1.4-1.4C20 14.8 20 12 20 12s0-2.8-.4-4.2Z" fill="white"/>
        <path d="M10 15l5-3-5-3v6Z" fill="#FF0000"/>
      </svg>
      <span class="yt-name">마음코드</span>
      <span class="yt-sub-text">구독</span>
    </a>
  </div>
  <span class="heart-icon">💕</span>
  <div class="title-main">마음코드 연애운 타로<span class="title-version">v1.00</span></div>
  <div class="title-sub">당신의 사랑 이야기를 카드가 말합니다</div>
</header>

<!-- Welcome -->
<div id="screen-welcome" class="screen active">
  <p class="oracle-quote">
    "사랑은 우주에서 가장 강력한 에너지입니다.<br>
    카드는 그 에너지의 흐름을 읽어드립니다."
  </p>

  <div style="text-align:center">
    <div style="font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;color:rgba(192,132,252,.5);text-transform:uppercase;margin-bottom:1rem;">질문 유형 선택</div>
    <div class="category-grid">
      <button class="category-btn active" data-cat="현재 연애운">
        <span class="cat-emoji">💫</span>
        <span class="cat-name">전체 연애운</span>
        <span class="cat-desc">지금의 사랑 에너지</span>
      </button>
      <button class="category-btn" data-cat="새로운 인연">
        <span class="cat-emoji">🌹</span>
        <span class="cat-name">새 인연</span>
        <span class="cat-desc">다가올 만남과 시작</span>
      </button>
      <button class="category-btn" data-cat="현재 관계">
        <span class="cat-emoji">💑</span>
        <span class="cat-name">현재 관계</span>
        <span class="cat-desc">지금 사귀는 사람과</span>
      </button>
      <button class="category-btn" data-cat="이별과 재회">
        <span class="cat-emoji">🌙</span>
        <span class="cat-name">이별 / 재회</span>
        <span class="cat-desc">헤어짐 혹은 돌아옴</span>
      </button>
    </div>
  </div>

  <div style="text-align:center">
    <div style="font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;color:rgba(192,132,252,.5);text-transform:uppercase;margin-bottom:.75rem;">카드 수</div>
    <div class="spread-row">
      <button class="spread-pill active" data-n="1">1장 (오늘의 메시지)</button>
      <button class="spread-pill" data-n="3">3장 (과거·현재·미래)</button>
      <button class="spread-pill" data-n="5">5장 (심층 리딩)</button>
    </div>
  </div>

  <button class="start-btn" id="btn-start">💕 타로 카드 펼치기</button>
</div>

<!-- Shuffle -->
<div id="screen-shuffle" class="screen">
  <div class="shuffle-instruction">
    <strong>마음을 고요히 하세요</strong><br>
    질문을 마음속에 품고<br>카드 덱을 <strong>3번 클릭</strong>하여 섞어주세요
  </div>

  <div class="deck-wrap" id="deck-wrap">
    <div class="deck-pile"><svg viewBox="0 0 60 60"><path d="M30 5 L35 20 L52 20 L38 30 L43 47 L30 37 L17 47 L22 30 L8 20 L25 20 Z" fill="none" stroke="#c084fc" stroke-width="1.5"/></svg></div>
    <div class="deck-pile"><svg viewBox="0 0 60 60"><path d="M30 5 L35 20 L52 20 L38 30 L43 47 L30 37 L17 47 L22 30 L8 20 L25 20 Z" fill="none" stroke="#c084fc" stroke-width="1.5"/></svg></div>
    <div class="deck-pile"><svg viewBox="0 0 60 60"><path d="M30 5 L35 20 L52 20 L38 30 L43 47 L30 37 L17 47 L22 30 L8 20 L25 20 Z" fill="none" stroke="#c084fc" stroke-width="1.5"/></svg></div>
    <div class="deck-pile"><svg viewBox="0 0 60 60"><path d="M30 5 L35 20 L52 20 L38 30 L43 47 L30 37 L17 47 L22 30 L8 20 L25 20 Z" fill="none" stroke="#c084fc" stroke-width="1.5"/></svg></div>
    <div class="deck-pile"><svg viewBox="0 0 60 60"><path d="M30 5 L35 20 L52 20 L38 30 L43 47 L30 37 L17 47 L22 30 L8 20 L25 20 Z" fill="none" stroke="#c084fc" stroke-width="1.5"/></svg></div>
  </div>

  <div class="shuffle-progress">
    <div class="prog-dot" id="d1"></div>
    <div class="prog-dot" id="d2"></div>
    <div class="prog-dot" id="d3"></div>
  </div>

  <button class="reveal-btn" id="btn-reveal">✨ 카드를 공개하세요 ✨</button>
  <button class="back-link" onclick="goTo('welcome')">← 돌아가기</button>
</div>

<!-- Reading -->
<div id="screen-reading" class="screen">
  <div class="reading-header">
    <div class="reading-category" id="reading-cat-label"></div>
  </div>
  <div class="cards-area" id="cards-area"></div>
  <div class="interp-box" id="interp-box">
    <div class="interp-title">💕 당신의 연애운 해석</div>
    <div id="interp-cards-list"></div>
    <div class="overall-msg" id="overall-msg"></div>

    selectedCat = btn.dataset.cat;
  });
});

// Spread pills
document.querySelectorAll('.spread-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.spread-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedN = parseInt(pill.dataset.n);
  });
});

document.getElementById('btn-start').addEventListener('click', () => {
  shuffleCount = 0;
  ['d1','d2','d3'].forEach(id => document.getElementById(id).classList.remove('done'));
  document.getElementById('btn-reveal').style.display = 'none';
  goTo('shuffle');
});

document.getElementById('deck-wrap').addEventListener('click', () => {
  if (shuffleCount >= 3) return;
  const wrap = document.getElementById('deck-wrap');
  wrap.classList.add('shuffling');
  setTimeout(() => wrap.classList.remove('shuffling'), 550);
  shuffleCount++;
  document.getElementById('d'+shuffleCount).classList.add('done');
  if (shuffleCount >= 3) {
    setTimeout(() => { document.getElementById('btn-reveal').style.display = 'inline-block'; }, 650);
  }
});

document.getElementById('btn-reveal').addEventListener('click', doReading);
document.getElementById('btn-new').addEventListener('click', () => goTo('welcome'));

function goTo(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  window.scrollTo(0, 0);
}

function doReading() {
  const n = selectedN;
  const shuffled = [...CARDS].sort(() => Math.random() - .5);
  drawn = shuffled.slice(0, n).map(c => ({ ...c, reversed: Math.random() < .28 }));
  const labels = POS_LABELS[n];

  document.getElementById('reading-cat-label').textContent = selectedCat + ' 타로 리딩';
  const area = document.getElementById('cards-area');
  area.innerHTML = '';
  document.getElementById('interp-box').classList.remove('show');
  document.getElementById('interp-cards-list').innerHTML = '';

  drawn.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';

    const posEl = document.createElement('div');
    posEl.className = 'pos-label';
    posEl.textContent = labels[i];

    const tc = document.createElement('div');
    tc.className = 'tarot-card' + (card.reversed ? ' card-reversed' : '');
    tc.innerHTML = `
      <div class="card-inner">
        <div class="c-back">
          <div class="c-back-inner">
            <svg viewBox="0 0 60 60" width="70%">
              <path d="M30 4 L34 18 L49 18 L37 27 L41 41 L30 33 L19 41 L23 27 L11 18 L26 18 Z" fill="none" stroke="#c084fc" stroke-width="1.2" opacity=".7"/>
            </svg>
          </div>
        </div>
        <div class="c-front">
          <div class="c-art" style="padding:0;overflow:hidden;">
            <img src="${card.img}" alt="${card.ko}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"/>
          </div>
          <div class="c-plate">
            <span class="c-name">${card.numeral}. ${card.name}</span>
            <span class="c-ko">${card.ko}</span>
          </div>
          <div class="c-reversed-tag">역방향</div>
        </div>
      </div>`;

    tc.addEventListener('click', () => {
      tc.classList.add('flipped');
    });

    slot.appendChild(posEl);
    slot.appendChild(tc);
    area.appendChild(slot);
  });

  goTo('reading');

  // Auto flip
  setTimeout(() => {
    document.querySelectorAll('.tarot-card').forEach((el, i) => {
      setTimeout(() => el.classList.add('flipped'), i * 350);
    });
  }, 700);

  // Build interpretation
  setTimeout(() => {
    const list = document.getElementById('interp-cards-list');
    drawn.forEach((card, i) => {
      const pos = labels[i];
      const loveText = card.reversed ? card.reversed_love : card.love;
      const div = document.createElement('div');
      div.className = 'interp-card';
      div.innerHTML = `
        <div class="interp-card-header">
          <span class="interp-pos-badge">${pos}</span>
          <span class="interp-card-name">${card.emoji} ${card.ko} (${card.name})${card.reversed?' — 역방향':''}</span>
        </div>
        <div class="interp-text">${loveText}</div>
        <div class="keywords-row">${card.kw.map(k=>`<span class="keyword-tag">${k}</span>`).join('')}</div>
      `;
      list.appendChild(div);
    });

    // Overall message
    const msgs = OVERALL_MSG[selectedCat] || OVERALL_MSG['현재 연애운'];
    const msg = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('overall-msg').innerHTML = `<p>💌 ${msg}</p>`;

    const box = document.getElementById('interp-box');
    box.classList.add('show');
    setTimeout(() => box.scrollIntoView({ behavior:'smooth', block:'nearest' }), 200);
  }, drawn.length * 350 + 1200);
}
</script>
</body>
</html>
